schema_version: 1

context:
  name: cleantext
  version: "1.1.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/cleantext-${{ version }}.tar.gz
  sha256: 854003de912406d8d821623774b307dc6f0626fd9fac0bdc5d24864ee3f37578

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - nltk
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - cleantext
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: An open-source python package to clean raw text data
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/prasanthg3/cleantext

extra:
  recipe-maintainers:
    - jan-janssen
